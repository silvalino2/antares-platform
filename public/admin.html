<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antares Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --gold:#C9A84C;--gold-l:#E4C97E;--gold-d:#7a6228;
  --bg:#060504;--s1:#0e0b07;--s2:#161109;--s3:#1e160c;
  --border:rgba(201,168,76,0.12);--border-hi:rgba(201,168,76,0.32);
  --text:#F2EDE4;--muted:#8A7D68;--dim:#4a4030;
  --green:#4CAF7A;--red:#C9504C;--amber:#C98A4C;--blue:#4C8AC9;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
.lbox{width:300px;background:var(--s1);border:1px solid var(--border-hi);border-radius:14px;padding:36px;display:flex;flex-direction:column;gap:16px;text-align:center;}
.lmark{width:46px;height:46px;border-radius:50%;border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);margin:0 auto;}
.ltitle{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold-l);}
.lsub{font-size:10px;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;}
input.li{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border .2s;text-align:left;width:100%;}
input.li:focus{border-color:var(--border-hi);}
button.lb{background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:12px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
button.lb:hover{background:var(--gold-l);}
.lerr{font-size:12px;color:var(--red);display:none;}

/* LAYOUT */
#app{display:none;grid-template-columns:230px 1fr;grid-template-rows:60px 1fr;height:100vh;}
#app.on{display:grid;}

.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);background:var(--s1);}
.brand{display:flex;align-items:center;gap:10px;}
.bmark{width:30px;height:30px;border:1px solid var(--gold-d);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:12px;}
.bname{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold-l);}
.brole{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);}
.tr{display:flex;align-items:center;gap:14px;}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(76,175,122,.25);border-radius:16px;}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
#clock{font-size:12px;color:var(--muted);}

.sidebar{background:var(--s1);border-right:1px solid var(--border);padding:18px 0;display:flex;flex-direction:column;}
.nlbl{font-size:9px;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;padding:0 18px;margin:12px 0 5px;}
.ni{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:1px 8px;border-radius:7px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;border:1px solid transparent;}
.ni:hover{background:var(--s2);color:var(--text);}
.ni.on{background:rgba(201,168,76,.07);border-color:var(--border);color:var(--gold-l);}
.nbadge{margin-left:auto;background:var(--gold);color:var(--bg);border-radius:9px;font-size:10px;font-weight:600;padding:1px 6px;}
.nbadge.r{background:var(--red);color:#fff;}
.nbadge.g{background:var(--green);color:#fff;}
.sf{margin-top:auto;padding:14px;}
.ob{width:100%;background:none;border:1px solid var(--border);border-radius:7px;padding:8px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.ob:hover{border-color:var(--red);color:var(--red);}

.main{overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;}
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.ptitle{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;line-height:1.1;}
.ptitle em{color:var(--gold);font-style:italic;}
.psub{font-size:11px;color:var(--dim);margin-top:4px;}
.btn{padding:9px 16px;border-radius:7px;font-size:11px;font-family:'Outfit',sans-serif;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:var(--gold);color:var(--bg);}
.btn-gold:hover{background:var(--gold-l);}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--border-hi);color:var(--text);}
.btn-red{background:rgba(201,80,76,.15);border:1px solid rgba(201,80,76,.3);color:var(--red);}
.btn-green{background:rgba(76,175,122,.15);border:1px solid rgba(76,175,122,.3);color:var(--green);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color .25s;}
.stat:hover{border-color:var(--border-hi);}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:.3s;}
.stat:hover::before{opacity:1;}
.slbl{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.sval{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;line-height:1;}
.sval.gold{color:var(--gold-l);}
.sval.g{color:var(--green);}
.sinfo{font-size:10px;color:var(--dim);margin-top:4px;}
.sico{position:absolute;top:14px;right:14px;font-size:18px;opacity:.1;}

/* PANEL */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:11px;overflow:hidden;}
.ph{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pt{font-family:'Cormorant Garamond',serif;font-size:16px;}
.pl{font-size:11px;color:var(--gold-d);cursor:pointer;transition:color .2s;}
.pl:hover{color:var(--gold);}

/* CLIENT CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .25s;}
.cc:hover{border-color:var(--border-hi);}
.cc-top{padding:16px;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--border);}
.cc-logo{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--s2);}
.cc-logo-placeholder{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-weight:600;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-size:14px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-type{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.05em;text-transform:capitalize;}
.cc-phone{font-size:11px;color:var(--dim);margin-top:3px;}
.cc-body{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.cc-badges{display:flex;gap:5px;flex-wrap:wrap;}
.badge{font-size:9px;padding:3px 8px;border-radius:8px;letter-spacing:.07em;text-transform:uppercase;font-weight:500;}
.badge.active{background:rgba(76,175,122,.12);border:1px solid rgba(76,175,122,.25);color:var(--green);}
.badge.pending{background:rgba(201,138,76,.1);border:1px solid rgba(201,138,76,.2);color:var(--amber);}
.badge.suspended{background:rgba(201,80,76,.1);border:1px solid rgba(201,80,76,.2);color:var(--red);}
.badge.live{background:rgba(76,175,122,.1);border:1px solid rgba(76,175,122,.2);color:var(--green);}
.badge.nowehook{background:rgba(201,80,76,.08);border:1px solid rgba(201,80,76,.15);color:var(--red);}
.cc-actions{display:flex;gap:6px;}
.cc-actions .btn{flex:1;font-size:10px;padding:7px 8px;justify-content:center;}

/* SWITCH TOGGLE */
.switch-wrap{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--s2);border-radius:8px;}
.switch-lbl{flex:1;font-size:12px;color:var(--muted);}
.switch{position:relative;width:44px;height:24px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.sw-slider{position:absolute;inset:0;background:var(--s3);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.3s;}
.sw-slider::before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:var(--dim);border-radius:50%;transition:.3s;}
.switch input:checked + .sw-slider{background:rgba(76,175,122,.2);border-color:rgba(76,175,122,.4);}
.switch input:checked + .sw-slider::before{transform:translateX(20px);background:var(--green);}

/* ADD FORM */
.form-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.field input,.field textarea,.field select{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border .2s;width:100%;}
.field input:focus,.field textarea:focus{border-color:var(--border-hi);}
.field textarea{resize:vertical;min-height:75px;line-height:1.55;}
.field .hint{font-size:11px;color:var(--dim);line-height:1.5;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.slbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);padding-top:4px;border-top:1px solid var(--border);margin-top:4px;}

/* BRAND PREVIEW CARD */
.brand-preview{display:none;border-radius:10px;overflow:hidden;border:1px solid var(--border-hi);margin-top:2px;}
.bp-header{padding:16px 18px;display:flex;align-items:center;gap:12px;}
.bp-logo{width:42px;height:42px;border-radius:9px;object-fit:cover;}
.bp-name{font-size:16px;font-weight:400;}
.bp-type{font-size:11px;margin-top:2px;opacity:.7;text-transform:capitalize;}
.bp-body{padding:12px 18px;font-size:12px;opacity:.75;border-top:1px solid rgba(255,255,255,.08);}

/* MENU BUILDER */
.mb{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:14px;}
.mrow{display:grid;grid-template-columns:1fr 90px 90px 80px auto;gap:7px;align-items:center;margin-bottom:7px;}
.mrow input,.mrow select{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:12px;outline:none;}
.del{background:none;border:1px solid rgba(201,80,76,.2);border-radius:6px;color:var(--red);padding:6px 8px;cursor:pointer;font-size:11px;}
.add-row{background:none;border:1px dashed var(--border-hi);border-radius:7px;padding:7px;color:var(--gold-d);cursor:pointer;font-size:12px;width:100%;transition:all .2s;margin-top:2px;}
.add-row:hover{border-color:var(--gold);color:var(--gold);}

.msg{padding:11px 15px;border-radius:8px;font-size:12px;display:none;align-items:center;gap:8px;margin-top:2px;}
.msg.err{background:rgba(201,80,76,.1);border:1px solid rgba(201,80,76,.2);color:var(--red);}
.msg.ok{background:rgba(76,175,122,.1);border:1px solid rgba(76,175,122,.2);color:var(--green);}
.msg.show{display:flex;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--s2);border:1px solid var(--border-hi);border-radius:9px;padding:12px 16px;font-size:13px;z-index:9990;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:8px;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}

.fi{animation:fu .35s ease forwards;opacity:0;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Fetching spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
